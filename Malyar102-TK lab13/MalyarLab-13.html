<html>
<head>
    <meta charset="UTF-8">
    <title>Лабораторна 13</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;}

        h1 {
            color: darkblue;
            text-align: center;}

        .bold-text {
            font-weight: bold;}

        .italic-text {
            font-style: italic;}

        .underline-text {
            text-decoration: underline;}

        .colored-text {
            color: green;}

        p {
            font-size: 16px;
            text-align: justify;}

        .block {
            border: 2px solid gray;
            padding: 10px;
            margin: 10px;
            background-color: #ffffff;}
    </style>
</head>
<body>
<h1>Приклади форматування тексту</h1>
<div class="block">
    <p class="bold-text">
        Це перший абзац тексту. Він написаний жирним шрифтом.
    </p>
</div>

<div class="block">
    <p class="italic-text">
        Це другий абзац. Тут використовується курсив.
    </p>
</div>

<div class="block">
    <p class="underline-text colored-text">
        Третій абзац підкреслений і має зелений колір. Це приклад комбінування стилів.
    </p>
</div>

<div class="block">
    <p>
        Це звичайний абзац тексту без додаткового форматування.
    </p>
</div>
</body>
</html>
