<html>
<head>
    <meta charset="UTF-8">
    <title>Сенсорна карта областей</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f9f9f9; }
        h1 { color: #2c3e50; }
        .map-container { margin-top: 20px; }
        img { border: 2px solid #333; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>Інтерактивна мапа України</h1>

    <div class="map-container">
        <img src="images/map1.jpg" usemap="#ukraine-map" alt="мапа України">

        <map name="ukraine-map">
            <area shape="poly" 
                  coords="430,230, 480,210, 530,230, 540,300, 500,350, 440,330, 420,280" 
                  href="#" 
                  title="Київська область: столиця України та центр держави." 
                  alt="Київ">

            <area shape="poly" 
                  coords="550,280, 650,270, 710,320, 710,380, 630,440, 570,410, 550,340" 
                  href="#" 
                  title="Полтавська область: серце України, багате на традиції та галушки." 
                  alt="Полтава">
        </map>
    </div>
</body>
</html>
